<!DOCTYPE html>
<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柯宛廷 醫師 | Dr. Ting Ko - 明利牙醫診所</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-color: #4A6274; 
            --sub-color: #748BA7;
            --text-main: #2C3E50;
            --text-sub: #546E7A;
            --bg-color: #FDFDFD;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: "PingFang TC", "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .container { width: 100%; max-width: 550px; padding: 0 15px; box-sizing: border-box; }

        .profile-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 45px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .avatar { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            margin-bottom: 20px; 
            object-fit: cover; 
            border: 4px solid white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            background: #eee; 
        }

        h1 { font-size: 1.7rem; margin: 0; letter-spacing: 2px; }
        .english-name { font-size: 0.95rem; color: #8E9AAF; margin-bottom: 30px; display: block; }

        .section-title { font-size: 0.85rem; color: var(--accent-color); font-weight: 700; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .section-title::before, .section-title::after { content: ""; height: 1px; width: 25px; background: #EEE; }

        .services-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 10px 0 40px 0;
            flex-wrap: wrap;
            gap: 15px 10px;
        }
        
        .service-item { 
            flex: 0 0 30%; 
            min-width: 85px; 
            max-width: 100px;
            text-align: center; 
        }

        @media (min-width: 480px) {
            .service-item { flex: 0 0 18%; }
        }

        .service-item svg { width: 55px; height: 55px; fill: none; stroke: var(--accent-color); stroke-width: 2; margin-bottom: 8px; }
        .service-label { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; line-height: 1.4; }

        .schedule-wrap { overflow-x: auto; margin-bottom: 35px; border-radius: 12px; border: 1px solid #F1F4F6; }
        .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #FFF; min-width: 450px; }
        
        /* (A) 功能：門診表手機版縮放優化 */
        @media (max-width: 450px) {
            .schedule-table { min-width: auto; font-size: 0.75rem; }
            .time-label { width: 70px; padding-left: 8px; }
            .schedule-table td, .schedule-table th { padding: 10px 4px; }
            .closed { font-size: 0.7rem; }
        }

        .schedule-table th { background: #F8FAFB; color: var(--accent-color); font-weight: 600; padding: 12px 8px; border-bottom: 1px solid #EEE; }
        .schedule-table td { padding: 12px 8px; border-bottom: 1px solid #F1F4F6; text-align: center; }
        .active-time { color: var(--accent-color); font-size: 1.2rem; }
        .closed { color: #D1D8DD; font-size: 0.75rem; font-weight: 300; }
        .time-label { font-weight: 600; color: var(--text-sub); background: #FDFDFD; width: 85px; text-align: left; padding-left: 12px;}

        .experience { text-align: left; font-size: 0.88rem; color: var(--text-sub); line-height: 2; background: #F9FAFB; padding: 25px; border-radius: 16px; margin-bottom: 35px; list-style: none; }
        .experience li { margin-bottom: 5px; position: relative; padding-left: 20px; font-weight: 400; }
        .experience li::before { content: "●"; position: absolute; left: 0; color: var(--sub-color); font-size: 0.6rem; top: 1px; }

        .btn { display: block; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 600; transition: 0.3s; margin-bottom: 15px; font-size: 1rem; text-align: center; }
        .btn-primary { background: var(--accent-color); color: white; box-shadow: 0 8px 20px rgba(74, 98, 116, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(74, 98, 116, 0.3); }
        
        .clinic-footer { font-size: 0.85rem; color: var(--text-sub); text-align: center; }
        .clinic-footer i { color: var(--sub-color); margin-right: 5px; }
        
        /* 地圖連結樣式 */
        .map-link { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .map-link:hover { border-bottom: 1px solid var(--sub-color); color: var(--accent-color); }
    </style></head>
